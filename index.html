<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BeratSearch Ultra 🔍</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4285f4;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #202124;
            --sidebar-w: 80px;
        }

        /* Karanlık Tema */
        body.dark-mode {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e8eaed;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
        }

        /* --- SIDEBAR (Sol Panel) --- */
        .sidebar {
            width: var(--sidebar-w);
            background-color: var(--primary);
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            z-index: 100;
        }

        .sidebar i {
            color: white;
            font-size: 1.6rem;
            margin-bottom: 35px;
            cursor: pointer;
            opacity: 0.8;
        }

        .sidebar i:hover { opacity: 1; transform: scale(1.1); }

        /* --- ANA İÇERİK --- */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .logo { font-weight: 800; font-size: 1.6rem; color: var(--text); }
        .logo span { color: var(--primary); }

        /* --- ARAMA ALANI --- */
        .search-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .search-box-wrapper {
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        input#arama {
            width: 100%;
            padding: 16px 25px;
            border-radius: 50px;
            border: 1px solid #dfe1e5;
            font-size: 1.1rem;
            outline: none;
            background: var(--card);
            color: var(--text);
            box-shadow: 0 1px 6px rgba(32,33,36,0.2);
        }

        .btn-group { margin-top: 25px; display: flex; gap: 15px; }

        button {
            padding: 12px 25px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #f1f3f4; color: #3c4043; }

        /* --- SONUÇLAR --- */
        #results {
            max-width: 800px;
            width: 90%;
            margin: 0 auto 50px;
        }

        .result-item {
            background: var(--card);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 4px solid var(--primary);
        }

        /* --- MOBİL AYARLAR (Yazı kaymasını çözen kısım) --- */
        @media (max-width: 600px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%;
                height: 60px;
                flex-direction: row;
                justify-content: space-around;
                padding-top: 0;
                position: fixed;
                bottom: 0;
            }
            header { padding: 15px 20px; }
            .search-container { padding-bottom: 80px; }
            .logo { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <i class="fa fa-home" onclick="location.reload()"></i>
        <i class="fa fa-moon" onclick="toggleDark()"></i>
        <i class="fa fa-gear"></i>
        <i class="fa fa-user"></i>
    </nav>

    <main class="content">
        <header>
            <div class="logo">Berat<span>Search</span></div>
            <div id="clock" style="font-weight: 600;">19:21</div>
        </header>

        <section class="search-container">
            <div class="search-box-wrapper">
                <input type="text" id="arama" placeholder="Aramak istediğin şeyi yaz...">
            </div>
            <div class="btn-group">
                <button class="btn-primary" onclick="doSearch()">Ara</button>
                <button class="btn-secondary" onclick="alert('Yakında!')">Keşfet</button>
            </div>
        </section>

        <div id="results"></div>
    </main>

    <script>
        // Basit Veritabanı
        const data = [
            { title: "Minecraft 1.21 Rehberi", desc: "Mending büyüsü ve yeni güncellemeler.", url: "https://minecraft.net" },
            { title: "Antalya Ulaşım", desc: "CV14 ve diğer hatların saatleri.", url: "#" },
            { title: "GitHub Profilim", desc: "Projelerimi buradan takip edebilirsin.", url: "https://github.com" }
        ];

        function doSearch() {
            const query = document.getElementById('arama').value.toLowerCase();
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = "";

            if(!query) return;

            const filtered = data.filter(x => x.title.toLowerCase().includes(query) || x.desc.toLowerCase().includes(query));

            filtered.forEach(item => {
                resDiv.innerHTML += `
                    <div class="result-item">
                        <h3 style="color:var(--primary); margin-bottom:5px;">${item.title}</h3>
                        <p style="font-size:0.9rem; opacity:0.8;">${item.desc}</p>
                    </div>
                `;
            });
            
            if(filtered.length === 0) resDiv.innerHTML = "<p style='text-align:center'>Sonuç bulunamadı.</p>";
            
            // Arama yapınca orta alanı daralt
            document.querySelector('.search-container').style.flex = "0";
            document.querySelector('.search-container').style.paddingTop = "40px";
        }

        function toggleDark() {
            document.body.classList.toggle('dark-mode');
        }

        // Enter tuşu desteği
        document.getElementById('arama').addEventListener('keypress', e => {
            if(e.key === 'Enter') doSearch();
        });

        // Saat güncelleme
        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours() + ":" + d.getMinutes().toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
