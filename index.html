<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BeratSearch Ultra 🔍</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --primary: #4285f4; --accent: #34a853;
  --bg: #fdfdfd; --card: #ffffff; --text: #1a1a1a;
  --sidebar-w: 70px; --header-h: 70px;
}

body.dark-mode {
  --bg: #121212; --card: #1e1e1e; --text: #f0f0f0;
}

* { box-sizing: border-box; transition: all 0.2s ease; }

body {
  margin: 0; font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  overflow-x: hidden;
}

/* --- SABİT SIDEBAR (Hizalama Sorunu Çözüldü) --- */
.sidebar {
  position: fixed; left: 0; top: 0; height: 100vh;
  width: var(--sidebar-w); background: var(--primary);
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 0; z-index: 2000; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
}

.sidebar i {
  font-size: 1.5rem; color: white; margin: 15px 0;
  cursor: pointer; opacity: 0.8; width: 100%; text-align: center;
}
.sidebar i:hover { opacity: 1; transform: scale(1.1); }

/* --- ANA İÇERİK ALANI --- */
.main-wrapper {
  margin-left: var(--sidebar-w);
  min-height: 100vh; display: flex; flex-direction: column;
}

header {
  height: var(--header-h); padding: 0 30px;
  display: flex; justify-content: space-between; align-items: center;
  background: var(--card); border-bottom: 1px solid rgba(0,0,0,0.05);
}

.logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; }
.logo span { color: var(--primary); }

/* --- ARAMA MOTORU MERKEZİ --- */
.hero {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 40px 20px;
}

.search-group {
  width: 100%; max-width: 650px; position: relative;
}

input#arama {
  width: 100%; padding: 18px 30px; border-radius: 50px;
  border: 2px solid transparent; background: var(--card);
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  font-size: 1.1rem; color: var(--text); outline: none;
}
input#arama:focus { border-color: var(--primary); box-shadow: 0 10px 40px rgba(66,133,244,0.2); }

.search-buttons { margin-top: 25px; display: flex; gap: 10px; }

button {
  padding: 12px 25px; border-radius: 30px; border: none;
  font-weight: 600; cursor: pointer; font-family: inherit;
}
.btn-primary { background: var(--primary); color: white; }
.btn-secondary { background: var(--card); color: var(--text); border: 1px solid #ddd; }

/* --- SONUÇLAR (BUGSIZ GRID) --- */
#results-container {
  max-width: 900px; width: 95%; margin: 0 auto 50px;
  display: grid; grid-template-columns: 1fr; gap: 15px;
}

.result-card {
  background: var(--card); padding: 20px; border-radius: 15px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.02);
  border-left: 5px solid var(--primary);
  animation: fadeIn 0.4s ease forwards;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* --- MOBİL UYUM (ÖNEMLİ!) --- */
@media (max-width: 768px) {
  .sidebar { width: 100%; height: 60px; bottom: 0; top: auto; flex-direction: row; justify-content: space-around; padding: 0; }
  .main-wrapper { margin-left: 0; margin-bottom: 60px; }
  header { padding: 0 15px; }
  .logo { font-size: 1.2rem; }
  input#arama { font-size: 1rem; padding: 14px 20px; }
}
</style>
</head>
<body id="app">

<div class="sidebar">
  <i class="fa fa-house" onclick="location.reload()"></i>
  <i class="fa fa-bolt" title="Trendler"></i>
  <i class="fa fa-moon" onclick="toggleDarkMode()"></i>
  <i class="fa fa-gamepad" title="Oyunlar"></i>
  <i class="fa fa-gear" onclick="openSettings()"></i>
</div>

<div class="main-wrapper">
  <header>
    <div class="logo">Berat<span>Search</span> Ultra</div>
    <div id="user-info" style="font-weight: 600;">
       <i class="fa fa-user-circle"></i> <span id="username-display">Misafir</span>
    </div>
  </header>

  <div class="hero">
    <div class="search-group">
      <input type="text" id="arama" placeholder="Antalya'da bugün ne yapmalı?" onfocus="this.placeholder=''" onblur="this.placeholder='Neyi keşfetmek istersin?'">
    </div>
    <div class="search-buttons">
      <button class="btn-primary" onclick="search()">Hızlı Ara</button>
      <button class="btn-secondary" onclick="lucky()">Şanslıyım</button>
    </div>
    <div id="quick-tags" style="margin-top:20px; font-size: 0.8rem; opacity: 0.7;">
       Trend: #Minecraft #HTML5 #AntalyaHavaDurumu
    </div>
  </div>

  <div id="results-container"></div>
</div>

<script>
const db = [
  { t: "Minecraft Rehberi", d: "En iyi büyü kombinasyonları ve elmas bulma taktikleri.", l: "#", c: "Oyun" },
  { t: "Antalya Gezi Rehberi", d: "Kaleiçi'nden Düden Şelalesi'ne Antalya turu.", l: "#", c: "Gezi" },
  { t: "Web Tasarım Kursu", d: "Sıfırdan HTML, CSS ve JS öğrenmeye başla.", l: "#", c: "Eğitim" },
  { t: "Berat'ın Projeleri", d: "Github üzerinde yayınlanan harika siteler.", l: "#", c: "Kod" }
];

function search() {
  const q = document.getElementById('arama').value.toLowerCase();
  const container = document.getElementById('results-container');
  container.innerHTML = "";

  const filtered = db.filter(x => x.t.toLowerCase().includes(q) || x.d.toLowerCase().includes(q));

  if(filtered.length > 0) {
    filtered.forEach(item => {
      container.innerHTML += `
        <div class="result-card">
          <small style="color:var(--primary)">${item.c}</small>
          <h3 style="margin:5px 0"><a href="${item.l}" style="text-decoration:none; color:inherit;">${item.t}</a></h3>
          <p style="margin:0; font-size:0.9rem; opacity:0.8;">${item.d}</p>
        </div>
      `;
    });
    // Sonuçlar gelince hero alanını küçült (Özellik 1)
    document.querySelector('.hero').style.flex = "0";
  }
}

function toggleDarkMode() {
  document.body.classList.toggle('dark-mode');
}

// Enter'a basınca ara
document.getElementById("arama").addEventListener("keypress", e => { if(e.key === "Enter") search(); });
</script>

</body>
</html>
