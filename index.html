<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>BeratSearch 🔍</title>
<style>
/* GENEL AYARLAR */
body {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #2b2b3e);
  color: white;
  overflow-x: hidden;
}

/* BAŞLIK ANİMASYONU */
h1 {
  text-align: center;
  font-size: 3em;
  margin-top: 80px;
  background: linear-gradient(90deg, #ff8c00, #ff3cac);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  0% { text-shadow: 0 0 5px #ff8c00, 0 0 10px #ff3cac; }
  100% { text-shadow: 0 0 20px #ff8c00, 0 0 40px #ff3cac; }
}

/* ARAMA KUTUSU */
.search-container {
  text-align: center;
  margin-top: 50px;
}

input {
  width: 60%;
  padding: 15px 20px;
  border-radius: 50px;
  border: none;
  outline: none;
  font-size: 1.2em;
  transition: all 0.3s ease;
}

input:focus {
  width: 65%;
  box-shadow: 0 0 15px #ff3cac;
}

/* BUTON */
button {
  padding: 15px 30px;
  border-radius: 50px;
  border: none;
  margin-left: 10px;
  background: linear-gradient(90deg, #ff8c00, #ff3cac);
  font-weight: bold;
  font-size: 1.1em;
  cursor: pointer;
  color: black;
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #ff3cac;
}

/* IFRAME SONUÇ */
#sonucFrame {
  width: 80%;
  height: 600px;
  border: none;
  margin: 50px auto;
  display: block;
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(255, 60, 172, 0.6);
  transition: all 0.5s ease;
}

#sonucFrame:hover {
  transform: scale(1.02);
}
</style>
</head>

<body>

<h1>BeratSearch 🔍</h1>

<div class="search-container">
  <input type="text" id="arama" placeholder="Bir şey ara...">
  <button onclick="ara()">Ara</button>
</div>

<iframe id="sonucFrame" src=""></iframe>

<script>
// Arama fonksiyonu
function ara() {
  let query = document.getElementById("arama").value;
  if(query.trim() === "") return;

  let url = "https://www.google.com/search?q=" + encodeURIComponent(query);
  document.getElementById("sonucFrame").src = url;
}

// Enter ile arama
document.getElementById("arama").addEventListener("keypress", function(e) {
  if (e.key === "Enter") ara();
});
</script>

</body>
</html>
