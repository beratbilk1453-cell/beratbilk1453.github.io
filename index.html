<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorgu Paneli</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1d; color: white; display: flex; justify-content: center; padding: 20px; }
        .container { background: #242526; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #4e9af1; margin-bottom: 20px; }
        select, input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #3a3b3c; border-radius: 8px; box-sizing: border-box; background: #3a3b3c; color: white; outline: none; }
        button { background-color: #4e9af1; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #357abd; }
        #sonuc { margin-top: 20px; padding: 15px; border-radius: 8px; background: #111; border: 1px solid #444; white-space: pre-wrap; font-size: 13px; color: #00ff00; display: none; overflow-x: auto; }
        .gizli { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistem Sorgu</h2>
    
    <select id="kategori" onchange="inputlariGuncelle()">
        <option value="gsm">TC'den GSM Sorgu</option>
        <option value="sulale">Sülale Sorgu</option>
        <option value="adres">Adres Sorgu</option>
        <option value="adsoyad">Ad Soyad Sorgu</option>
        <option value="gsmtc">GSM'den TC Sorgu</option>
    </select>

    <div id="tekliInput">
        <input type="text" id="anaInput" placeholder="TC Numarası Giriniz">
    </div>

    <div id="cokluInput" class="gizli">
        <input type="text" id="ad" placeholder="Ad">
        <input type="text" id="soyad" placeholder="Soyad">
        <input type="text" id="il" placeholder="İl (Örn: İstanbul)">
        <input type="text" id="ilce" placeholder="İlçe (Örn: Kadıköy)">
    </div>

    <button onclick="sorgula()">SORGULA</button>

    <div id="sonuc"></div>
</div>

<script>
    function inputlariGuncelle() {
        const kat = document.getElementById('kategori').value;
        const tekli = document.getElementById('tekliInput');
        const coklu = document.getElementById('cokluInput');
        const anaInput = document.getElementById('anaInput');

        if (kat === 'adsoyad') {
            tekli.classList.add('gizli');
            coklu.classList.remove('gizli');
        } else {
            tekli.classList.remove('gizli');
            coklu.classList.add('gizli');
            anaInput.placeholder = (kat === 'gsmtc') ? "GSM No Giriniz" : "TC No Giriniz";
        }
    }

    async function sorgula() {
        const kat = document.getElementById('kategori').value;
        const sonucDiv = document.getElementById('sonuc');
        const btn = document.querySelector('button');
        
        // CORS engelini aşmak için kullanılan ücretsiz köprü (Proxy)
        const proxy = "https://api.allorigins.win/get?url=";
        let hedefUrl = "";

        if (kat === 'adsoyad') {
            const ad = document.getElementById('ad').value;
            const soyad = document.getElementById('soyad').value;
            const il = document.getElementById('il').value;
            const ilce = document.getElementById('ilce').value;
            hedefUrl = `https://arastir.sbs/api/adsoyad.php?adi=${ad}&soyadi=${soyad}&il=${il}&ilce=${ilce}`;
        } else {
            const deger = document.getElementById('anaInput').value;
            if (kat === 'gsm') hedefUrl = `https://arastir.sbs/api/tcgsm.php?tc=${deger}`;
            if (kat === 'sulale') hedefUrl = `https://arastir.sbs/api/sulale.php?tc=${deger}`;
            if (kat === 'adres') hedefUrl = `https://arastir.sbs/api/adres.php?tc=${deger}`;
            if (kat === 'gsmtc') hedefUrl = `https://arastir.sbs/api/gsmtc.php?gsm=${deger}`;
        }

        sonucDiv.style.display = "block";
        sonucDiv.innerText = "Sorgulanıyor, lütfen bekleyin...";
        btn.disabled = true;

        try {
            // Proxy üzerinden istek atıyoruz
            const response = await fetch(proxy + encodeURIComponent(hedefUrl));
            const responseData = await response.json();
            
            // AllOrigins veriyi 'contents' içine koyar, onu JSON'a çeviriyoruz
            const data = JSON.parse(responseData.contents);
            
            if (data) {
                sonucDiv.innerText = JSON.stringify(data, null, 2);
            } else {
                sonucDiv.innerText = "API boş yanıt döndürdü.";
            }
        } catch (error) {
            sonucDiv.innerText = "Hata oluştu! API sunucusu kapalı olabilir veya hatalı sorgu yaptınız.";
            console.error("Hata:", error);
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
