<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BeratSearch X100 🛡️</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --p: #4285f4; --bg: #f0f2f5; --c: #ffffff; --t: #1c1e21; --shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        body.dark {
            --bg: #18191a; --c: #242526; --t: #e4e6eb; --shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        /* RESET & BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--t); overflow-x: hidden; transition: 0.3s; padding-bottom: 80px; }

        /* 1-10: GÖRSEL KORUMA KATMANI (Zero Bug Layout) */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: var(--c); box-shadow: var(--shadow);
            position: sticky; top: 0; z-index: 999;
        }

        /* 11-20: DİNAMİK BİLGİ PANELİ */
        .info-bar { display: flex; gap: 15px; font-size: 0.85rem; font-weight: 600; }
        .status-pill { background: var(--p); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; }

        /* 21-40: SMART SEARCH ENGINE UI */
        .hero { padding: 60px 20px; text-align: center; max-width: 600px; margin: 0 auto; }
        .logo-x { font-size: 3.5rem; font-weight: 900; letter-spacing: -3px; margin-bottom: 20px; }
        .logo-x span { color: var(--p); text-shadow: 2px 2px 0px rgba(66, 133, 244, 0.2); }

        .search-input-box {
            background: var(--c); border-radius: 50px; display: flex; align-items: center;
            padding: 5px 20px; box-shadow: var(--shadow); border: 2px solid transparent;
        }
        .search-input-box:focus-within { border-color: var(--p); }
        input { 
            flex: 1; border: none; outline: none; padding: 15px; font-size: 1.1rem; 
            background: transparent; color: var(--t); font-family: inherit;
        }

        /* 41-60: BUTTON ECOSYSTEM */
        .btn-grid { display: flex; gap: 10px; justify-content: center; margin-top: 25px; flex-wrap: wrap; }
        .btn { 
            padding: 12px 25px; border-radius: 30px; border: none; font-weight: 700; 
            cursor: pointer; transition: 0.2s; background: var(--p); color: white;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-alt { background: var(--c); color: var(--t); border: 1px solid #ddd; }
        .btn:active { transform: scale(0.95); }

        /* 61-80: SONUÇ MOTORU & KARTLAR */
        #results { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        .card { 
            background: var(--c); padding: 20px; border-radius: 18px; margin-bottom: 15px;
            box-shadow: var(--shadow); animation: slideIn 0.3s ease; border-left: 6px solid var(--p);
        }
        .card h3 a { color: var(--p); text-decoration: none; font-size: 1.3rem; }
        .card p { font-size: 0.95rem; margin-top: 8px; opacity: 0.8; line-height: 1.4; }

        /* 81-95: MODAL & AYAR SİSTEMİ */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; backdrop-filter: blur(5px); }
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--c); width: 90%; max-width: 400px; padding: 30px; border-radius: 25px;
            z-index: 2001; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* 96-100: MOBİL NAVİGASYON (Alt Bar) */
        nav { 
            position: fixed; bottom: 0; width: 100%; background: var(--c); 
            display: flex; justify-content: space-around; padding: 15px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000;
        }
        nav i { font-size: 1.5rem; color: #888; cursor: pointer; transition: 0.3s; }
        nav i.active { color: var(--p); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="berat-app">

<header>
    <div class="info-bar">
        <span><i class="fa fa-sun"></i> 24°C</span>
        <span id="clock">00:00</span>
        <span class="status-pill">8/E ONLINE</span>
    </div>
    <div onclick="toggleModal('profileModal')" style="cursor: pointer;">
        <i class="fa fa-user-shield fa-lg" style="color: var(--p);"></i>
    </div>
</header>

<div class="hero">
    <div class="logo-x">Berat<span>X100</span></div>
    <div class="search-input-box">
        <i class="fa fa-search" style="color: #888;"></i>
        <input type="text" id="searchInput" placeholder="Antalya'da bugün ne var?" autocomplete="off">
    </div>
    <div class="btn-grid">
        <button class="btn" onclick="runSearch()"><i class="fa fa-bolt"></i> Ara</button>
        <button class="btn btn-alt" onclick="toggleDark()"><i class="fa fa-moon"></i> Tema</button>
        <button class="btn btn-alt" onclick="toggleModal('settingsModal')"><i class="fa fa-cog"></i> Ayarlar</button>
    </div>
</div>

<div id="results"></div>

<nav>
    <i class="fa fa-home active" onclick="location.reload()"></i>
    <i class="fa fa-compass" onclick="lucky()"></i>
    <i class="fa fa-gamepad" onclick="alert('Minecraft Sunucu Durumu: Aktif')"></i>
    <i class="fa fa-user" onclick="toggleModal('profileModal')"></i>
</nav>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="modal" id="settingsModal">
    <h2 style="margin-bottom: 15px;">Ayar Paneli</h2>
    <p>Arama Filtresi: <b>Güvenli</b></p><br>
    <button class="btn" style="width: 100%;" onclick="toggleDark()">Karanlık Modu Aç/Kapat</button><br><br>
    <button class="btn btn-alt" style="width: 100%;" onclick="closeAll()">Kapat</button>
</div>

<div class="modal" id="profileModal">
    <h2>Berat'ın Profili</h2><br>
    <p><b>Statü:</b> Geliştirici (8/E)</p>
    <p><b>Konum:</b> Antalya, TR</p>
    <p><b>Proje:</b> BeratSearch X100 Pro</p><br>
    <button class="btn" style="width: 100%;" onclick="closeAll()">Geri Dön</button>
</div>

<script>
    // ÖZELLİK 101: Gelişmiş Veri Havuzu
    const veritabanı = [
        { t: "YouTube", d: "Video ve eğlence dünyası.", u: "https://www.youtube.com" },
        { t: "GitHub - Berat", d: "Kod depolama ve web projelerim.", u: "https://www.github.com" },
        { t: "Minecraft Bedrock", d: "Sürüm 1.21 elmas ve büyü rehberi.", u: "https://www.minecraft.net" },
        { t: "Antalya Otobüs", d: "CV14, Cebesoy ve tüm şehir hatları.", u: "https://www.antalya-ulasim.com" },
        { t: "Stack Overflow", d: "Kodlama hataları için çözüm merkezi.", u: "https://stackoverflow.com" }
    ];

    // ÖZELLİK 102: Süper Arama Fonksiyonu
    function runSearch() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const res = document.getElementById('results');
        res.innerHTML = "";

        if(q.trim() === "") return;

        const filtered = veritabanı.filter(item => 
            item.t.toLowerCase().includes(q) || item.d.toLowerCase().includes(q)
        );

        if(filtered.length > 0) {
            filtered.forEach(item => {
                res.innerHTML += `
                    <div class="card">
                        <h3><a href="${item.u}" target="_blank">${item.t} <i class="fa fa-external-link-alt" style="font-size:0.8rem"></i></a></h3>
                        <p>${item.d}</p>
                    </div>
                `;
            });
            window.scrollTo({ top: 300, behavior: 'smooth' });
        } else {
            res.innerHTML = "<div class='card' style='text-align:center'>Sonuç bulunamadı 🔍</div>";
        }
    }

    // ÖZELLİK 103: Gece Modu Hafızası
    function toggleDark() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('berat-dark', isDark);
    }

    // ÖZELLİK 104: Modal Kontrolcüleri
    function toggleModal(id) {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById(id).style.display = 'block';
    }

    function closeAll() {
        document.getElementById('overlay').style.display = 'none';
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }

    // ÖZELLİK 105: Şanslıyım (Rastgele)
    function lucky() {
        const r = veritabanı[Math.floor(Math.random() * veritabanı.length)];
        window.open(r.u, '_blank');
    }

    // ÖZELLİK 106: Canlı Saat
    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = d.getHours() + ":" + d.getMinutes().toString().padStart(2, '0');
    }, 1000);

    // Başlangıç Ayarları
    if(localStorage.getItem('berat-dark') === 'true') document.body.classList.add('dark');
    document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key === 'Enter') runSearch(); });
</script>

</body>
</html>
