<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>BeratSearch Pro 🔍</title>
<style>
/* Temel stil */
body {
  margin:0; padding:0;
  font-family:'Poppins',sans-serif;
  background:#f5f5f5; color:#111;
}
header { display:flex; justify-content:space-between; align-items:center; padding:10px 20px; background:#fff; box-shadow:0 1px 5px rgba(0,0,0,0.1);}
header h1 { margin:0; font-size:1.8em; color:#222;}
.profile { cursor:pointer; }
.search-container { text-align:center; margin:30px 0; }
input { width:50%; padding:10px 15px; font-size:1em; border:1px solid #ccc; border-radius:25px; outline:none; transition:0.3s; }
input:focus { box-shadow:0 0 8px #aaa; width:55%; }
button { padding:10px 20px; border:none; border-radius:25px; background:#4285f4; color:#fff; cursor:pointer; transition:0.3s; }
button:hover { background:#3367d6; }

#sonuclar { width:80%; margin:20px auto; }
.result { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; box-shadow:0 1px 5px rgba(0,0,0,0.1); transition:0.3s; }
.result:hover { box-shadow:0 3px 10px rgba(0,0,0,0.2); }
.result a { font-weight:bold; color:#4285f4; text-decoration:none; }
.result p { margin:5px 0 0; font-size:0.9em; color:#555; }

#overlay, #ayarlarPanel, #girisPanel { display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:1000; }
#overlay { background: rgba(0,0,0,0.5); }
.modal { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; color:#111; padding:20px; border-radius:15px; width:300px; box-shadow:0 5px 15px rgba(0,0,0,0.3); }
.modal h3 { margin-top:0; }
.modal input, .modal select { width:100%; padding:8px; margin-top:5px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc; }
.modal button { width:100%; margin-top:10px; }

.sidebar { position:fixed; left:0; top:0; height:100%; width:60px; background:#4285f4; display:flex; flex-direction:column; align-items:center; padding-top:20px; color:#fff; }
.sidebar i { font-size:1.5em; margin:20px 0; cursor:pointer; }
.sidebar i:hover { color:#fff; opacity:0.7; }

</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header>
  <h1>BeratSearch</h1>
  <div class="profile" onclick="toggleProfile()">
    <i class="fa fa-user"></i> <span id="kullaniciGoster"></span>
  </div>
</header>

<div class="sidebar">
  <i class="fa fa-cog" title="Ayarlar" onclick="toggleAyarlar()"></i>
  <i class="fa fa-sign-out" title="Çıkış" onclick="cikisYap()"></i>
</div>

<div class="search-container">
  <input type="text" id="arama" placeholder="Bir şey ara...">
  <button onclick="ara()">Ara</button>
</div>

<div id="sonuclar"></div>

<!-- Overlay -->
<div id="overlay"></div>

<!-- Ayarlar Panel -->
<div id="ayarlarPanel" class="modal">
  <h3>Ayarlar</h3>
  <label>Tema:</label>
  <select id="tema">
    <option value="light">Gündüz</option>
    <option value="dark">Gece</option>
  </select>
  <label>Font Boyutu:</label>
  <input type="number" id="fontBoyutu" value="16">
  <label>Kategori Filtresi:</label>
  <select id="kategoriFiltre">
    <option value="hepsi">Hepsi</option>
    <option value="Oyun">Oyun</option>
    <option value="Eğlence">Eğlence</option>
    <option value="Bilgi">Bilgi</option>
    <option value="Kod">Kod</option>
    <option value="Sosyal">Sosyal</option>
    <option value="Araç">Araç</option>
  </select>
  <button onclick="kaydetAyarlar()">Kaydet</button>
</div>

<!-- Giriş/Kayıt Panel -->
<div id="girisPanel" class="modal">
  <h3>Giriş / Kayıt</h3>
  <label>Kullanıcı Adı:</label><input type="text" id="kullaniciAdi">
  <label>Şifre:</label><input type="password" id="sifre">
  <button onclick="kayit()">Kayıt Ol</button>
  <button onclick="giris()">Giriş Yap</button>
  <button onclick="toggleGirisPanel()">Kapat</button>
</div>

<script>
// ------------------ Veri tabanı
const veriTabani = [
  { baslik:"YouTube",link:"https://www.youtube.com",aciklama:"Video platformu",kategori:"Eğlence" },
  { baslik:"Google",link:"https://www.google.com",aciklama:"Arama motoru",kategori:"Araç" },
  { baslik:"Wikipedia",link:"https://www.wikipedia.org",aciklama:"Ücretsiz ansiklopedi",kategori:"Bilgi" },
  { baslik:"Minecraft",link:"https://www.minecraft.net",aciklama:"Oyun sitesi",kategori:"Oyun" },
  { baslik:"GitHub",link:"https://www.github.com",aciklama:"Kod paylaşım platformu",kategori:"Kod" },
  { baslik:"Discord",link:"https://www.discord.com",aciklama:"Sohbet platformu",kategori:"Sosyal" },
  { baslik:"Stack Overflow",link:"https://stackoverflow.com",aciklama:"Programlama soruları",kategori:"Kod" },
  { baslik:"Spotify",link:"https://www.spotify.com",aciklama:"Müzik dinleme",kategori:"Eğlence" },
  { baslik:"Netflix",link:"https://www.netflix.com",aciklama:"Dizi ve film izleme",kategori:"Eğlence" },
  { baslik:"Reddit",link:"https://www.reddit.com",aciklama:"Sosyal içerik paylaşımı",kategori:"Sosyal" }
  // İstersen buraya 100+ site ekleyebilirsin
];

// ------------------ Arama fonksiyonu
function ara() {
  const query = document.getElementById("arama").value.toLowerCase();
  const kategori = document.getElementById("kategoriFiltre").value;
  let sonucHTML = "";

  let sonuc = veriTabani.filter(item => 
    (item.baslik.toLowerCase().includes(query) || item.aciklama.toLowerCase().includes(query)) &&
    (kategori==="hepsi" || item.kategori===kategori)
  );

  if(sonuc.length>0) {
    sonuc.forEach(item=>{
      sonucHTML+=`<div class="result"><a href="${item.link}" target="_blank">${item.baslik}</a><p>${item.aciklama} | <i>${item.kategori}</i></p></div>`;
    });
  } else { sonucHTML="Sonuç bulunamadı 😢"; }

  document.getElementById("sonuclar").innerHTML = sonucHTML;
}
document.getElementById("arama").addEventListener("keypress",function(e){ if(e.key==="Enter") ara(); });

// ------------------ Ayarlar
function toggleAyarlar() {
  const panel=document.getElementById("ayarlarPanel");
  const overlay=document.getElementById("overlay");
  const display=panel.style.display==="block"?"none":"block";
  panel.style.display=display; overlay.style.display=display;
}
function kaydetAyarlar() {
  const tema=document.getElementById("tema").value;
  const font=document.getElementById("fontBoyutu").value;
  const kategori=document.getElementById("kategoriFiltre").value;
  document.body.style.fontSize=font+"px";
  if(tema==="dark") document.body.style.background="#222",document.body.style.color="#fff";
  else document.body.style.background="#f5f5f5",document.body.style.color="#111";
  toggleAyarlar();
}

// ------------------ Hesap sistemi
function toggleGirisPanel() {
  const panel=document.getElementById("girisPanel");
  const overlay=document.getElementById("overlay");
  const display=panel.style.display==="block"?"none":"block";
  panel.style.display=display; overlay.style.display=display;
}
function kayit() {
  const user=document.getElementById("kullaniciAdi").value;
  const pass=document.getElementById("sifre").value;
  if(!user||!pass){ alert("Boş bırakılamaz!"); return;}
  localStorage.setItem("user_"+user,pass);
  alert("Kayıt başarılı! Giriş yapabilirsiniz.");
  toggleGirisPanel();
  document.getElementById("kullaniciGoster").innerText="";
}
function giris() {
  const user=document.getElementById("kullaniciAdi").value;
  const pass=document.getElementById("sifre").value;
  const kayitli=localStorage.getItem("user_"+user);
  if(kayitli && kayitli===pass){ 
    alert("Giriş başarılı! Hoşgeldin "+user); 
    document.getElementById("kullaniciGoster").innerText=user;
    toggleGirisPanel();
  } else { alert("Hatalı kullanıcı adı veya şifre"); }
}
function cikisYap() {
  document.getElementById("kullaniciGoster").innerText="";
  alert("Çıkış yapıldı.");
}

// ------------------ Profil tıklandığında
function toggleProfile() {
  const user=document.getElementById("kullaniciGoster").innerText;
  if(!user) toggleGirisPanel();
  else alert("Hoşgeldin "+user+"\nAyarlar için sol paneli kullanabilirsiniz.");
}
</script>

</body>
</html>
