<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BeratSearch 🔍</title>

<style>
body {
  background: #121212;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin-top: 100px;
}

input {
  width: 60%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  outline: none;
}

button {
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
}

.result {
  text-align: left;
  width: 60%;
  margin: 20px auto;
  padding: 10px;
  border-bottom: 1px solid gray;
}
a {
  color: #4da6ff;
  text-decoration: none;
}
</style>
</head>

<body>

<h1>BeratSearch 🔍</h1>

<input type="text" id="arama" placeholder="Bir şey ara...">
<button onclick="ara()">Ara</button>

<div id="sonuclar"></div>

<script>
async function ara() {
  let query = document.getElementById("arama").value;

  let url = "https://api.duckduckgo.com/?q=" + query + "&format=json&pretty=1";

  let response = await fetch(url);
  let data = await response.json();

  let sonucHTML = "";

  if (data.RelatedTopics.length > 0) {
    data.RelatedTopics.forEach(item => {
      if (item.Text && item.FirstURL) {
        sonucHTML += `
        <div class="result">
          <a href="${item.FirstURL}" target="_blank">
            ${item.Text}
          </a>
        </div>
        `;
      }
    });
  } else {
    sonucHTML = "Sonuç bulunamadı 😢";
  }

  document.getElementById("sonuclar").innerHTML = sonucHTML;
}
</script>

</body>
</html>
