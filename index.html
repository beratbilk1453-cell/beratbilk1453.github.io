<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>BeratSearch Pro 🔍</title>
<style>
/* Temel stil ve arka plan */
body {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #2b2b3e);
  color: white;
  overflow-x: hidden;
}

/* Başlık animasyonu */
h1 {
  text-align: center;
  font-size: 3em;
  margin-top: 30px;
  background: linear-gradient(90deg, #ff8c00, #ff3cac);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: glow 2s infinite alternate;
}
@keyframes glow {
  0% { text-shadow: 0 0 5px #ff8c00, 0 0 10px #ff3cac; }
  100% { text-shadow: 0 0 20px #ff8c00, 0 0 40px #ff3cac; }
}

/* Arama kutusu ve buton */
.search-container { text-align:center; margin-top: 20px; }
input { width: 60%; padding: 15px 20px; border-radius: 50px; border: none; outline: none; font-size: 1.2em; transition: all 0.3s ease; }
input:focus { width: 65%; box-shadow: 0 0 15px #ff3cac; }
button { padding: 15px 30px; border-radius: 50px; border: none; margin-left: 10px; background: linear-gradient(90deg, #ff8c00, #ff3cac); font-weight: bold; font-size: 1.1em; cursor: pointer; color: black; transition: all 0.3s ease; }
button:hover { transform: scale(1.1); box-shadow: 0 0 20px #ff3cac; }

/* Sonuç kutuları */
#sonuclar { width: 80%; margin: 30px auto; }
.result { padding: 15px; margin-bottom: 15px; border-radius: 15px; background: rgba(255,255,255,0.05); transition: all 0.3s ease; }
.result:hover { background: rgba(255,60,172,0.2); transform: scale(1.02); }
a { color: #4da6ff; text-decoration: none; font-weight: bold; font-size: 1.2em; }

/* Ayarlar paneli */
#ayarlarPanel { display:none; position: fixed; top: 50%; left:50%; transform: translate(-50%, -50%); background: #222; padding: 20px; border-radius: 20px; width: 300px; z-index: 1000; }
#ayarlarPanel label { display:block; margin-top:10px; }
#ayarlarPanel select, #ayarlarPanel input { width:100%; padding:5px; margin-top:5px; border-radius: 5px; border:none; }
#ayarlarPanel button { margin-top:15px; width:100%; }

#overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index:900; }

</style>
</head>
<body>

<h1>BeratSearch 🔍</h1>

<!-- Giriş/Kayıt ve Ayarlar -->
<div style="text-align:center; margin-top:10px;">
  <button onclick="toggleGirisPanel()">Giriş / Kayıt</button>
  <button onclick="toggleAyarlar()">Ayarlar</button>
</div>

<!-- Arama kutusu -->
<div class="search-container">
  <input type="text" id="arama" placeholder="Bir şey ara...">
  <button onclick="ara()">Ara</button>
</div>

<!-- Arama sonuçları -->
<div id="sonuclar"></div>

<!-- Ayarlar paneli -->
<div id="overlay" onclick="toggleAyarlar()"></div>
<div id="ayarlarPanel">
  <h3>Ayarlar</h3>
  <label>Tema:</label>
  <select id="tema">
    <option value="dark">Gece</option>
    <option value="light">Gündüz</option>
  </select>
  <label>Font boyutu:</label>
  <input type="number" id="fontBoyutu" value="16">
  <label>Kategori filtresi:</label>
  <select id="kategoriFiltre">
    <option value="hepsi">Hepsi</option>
    <option value="Oyun">Oyun</option>
    <option value="Eğlence">Eğlence</option>
    <option value="Bilgi">Bilgi</option>
    <option value="Kod">Kod</option>
    <option value="Sosyal">Sosyal</option>
    <option value="Araç">Araç</option>
  </select>
  <button onclick="kaydetAyarlar()">Kaydet</button>
</div>

<!-- Giriş/Kayıt paneli (localStorage tabanlı) -->
<div id="girisPanel" style="display:none; position:fixed; top:50%; left:50%; transform: translate(-50%,-50%); background:#222; padding:20px; border-radius:20px; width:300px; z-index:1000;">
  <h3>Giriş / Kayıt</h3>
  <label>Kullanıcı adı:</label><input type="text" id="kullaniciAdi"><br>
  <label>Şifre:</label><input type="password" id="sifre"><br>
  <button onclick="kayit()">Kayıt Ol</button>
  <button onclick="giris()">Giriş Yap</button>
  <button onclick="toggleGirisPanel()">Kapat</button>
</div>

<script>
// ----------------------
// 1️⃣ Veri tabanı
const veriTabani = [
  { baslik: "Minecraft", link: "https://www.minecraft.net", aciklama: "Minecraft resmi sitesi", kategori: "Oyun" },
  { baslik: "YouTube", link: "https://www.youtube.com", aciklama: "Video paylaşım ve içerik platformu", kategori: "Eğlence" },
  { baslik: "Wikipedia", link: "https://www.wikipedia.org", aciklama: "Ücretsiz ansiklopedi", kategori: "Bilgi" },
  { baslik: "Google", link: "https://www.google.com", aciklama: "Arama motoru", kategori: "Araç" },
  { baslik: "GitHub", link: "https://www.github.com", aciklama: "Kod depolama platformu", kategori: "Kod" },
  { baslik: "Discord", link: "https://www.discord.com", aciklama: "Topluluk ve sohbet platformu", kategori: "Sosyal" },
  { baslik: "Stack Overflow", link: "https://stackoverflow.com", aciklama: "Programlama soruları", kategori: "Kod" },
  { baslik: "Spotify", link: "https://www.spotify.com", aciklama: "Müzik platformu", kategori: "Eğlence" },
  { baslik: "Netflix", link: "https://www.netflix.com", aciklama: "Film ve dizi platformu", kategori: "Eğlence" },
  { baslik: "Khan Academy", link: "https://www.khanacademy.org", aciklama: "Eğitim kaynakları", kategori: "Bilgi" },
  { baslik: "Reddit", link: "https://www.reddit.com", aciklama: "Sosyal içerik paylaşımı", kategori: "Sosyal" },
  { baslik: "Trello", link: "https://www.trello.com", aciklama: "Görev yönetim aracı", kategori: "Araç" },
  { baslik: "Figma", link: "https://www.figma.com", aciklama: "Tasarım aracı", kategori: "Araç" },
  { baslik: "Pinterest", link: "https://www.pinterest.com", aciklama: "Görsel paylaşım platformu", kategori: "Eğlence" },
  { baslik: "Coursera", link: "https://www.coursera.org", aciklama: "Ücretsiz ve ücretli eğitim", kategori: "Bilgi" },
  { baslik: "Medium", link: "https://medium.com", aciklama: "Makale ve blog platformu", kategori: "Bilgi" },
  { baslik: "Facebook", link: "https://www.facebook.com", aciklama: "Sosyal medya", kategori: "Sosyal" },
  { baslik: "Twitter", link: "https://www.twitter.com", aciklama: "Mikroblog platformu", kategori: "Sosyal" },
  { baslik: "Instagram", link: "https://www.instagram.com", aciklama: "Fotoğraf ve video paylaşımı", kategori: "Sosyal" },
  { baslik: "LinkedIn", link: "https://www.linkedin.com", aciklama: "Profesyonel ağ", kategori: "Sosyal" }
];

// ----------------------
// 2️⃣ Arama fonksiyonu
function ara() {
  const query = document.getElementById("arama").value.toLowerCase();
  const kategori = document.getElementById("kategoriFiltre").value;
  let sonucHTML = "";

  let sonuc = veriTabani.filter(item => 
    (item.baslik.toLowerCase().includes(query) || item.aciklama.toLowerCase().includes(query)) &&
    (kategori === "hepsi" || item.kategori === kategori)
  );

  if (sonuc.length > 0) {
    sonuc.forEach(item => {
      sonucHTML += `
        <div class="result">
          <a href="${item.link}" target="_blank">${item.baslik}</a>
          <p>${item.aciklama} | <i>${item.kategori}</i></p>
        </div>
      `;
    });
  } else {
    sonucHTML = "Sonuç bulunamadı 😢";
  }

  document.getElementById("sonuclar").innerHTML = sonucHTML;
}

// Enter ile arama
document.getElementById("arama").addEventListener("keypress", function(e) {
  if (e.key === "Enter") ara();
});

// ----------------------
// 3️⃣ Ayarlar paneli
function toggleAyarlar() {
  const panel = document.getElementById("ayarlarPanel");
  const overlay = document.getElementById("overlay");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
  overlay.style.display = panel.style.display;
}

function kaydetAyarlar() {
  const tema = document.getElementById("tema").value;
  const fontBoyutu = document.getElementById("fontBoyutu").value;
  document.body.style.fontSize = fontBoyutu + "px";
  if (tema === "light") document.body.style.background = "#eee", document.body.style.color = "#111";
  else document.body.style.background = "linear-gradient(135deg, #1e1e2f, #2b2b3e)", document.body.style.color = "white";
  toggleAyarlar();
}

// ----------------------
// 4️⃣ Hesap sistemi (localStorage)
function toggleGirisPanel() {
  const panel = document.getElementById("girisPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

function kayit() {
  const username = document.getElementById("kullaniciAdi").value;
  const password = document.getElementById("sifre").value;
  if (!username || !password) { alert("Boş bırakma!"); return; }
  localStorage.setItem("user_" + username, password);
  alert("Kayıt başarılı!");
  toggleGirisPanel();
}

function giris() {
  const username = document.getElementById("kullaniciAdi").value;
  const password = document.getElementById("sifre").value;
  const kayitli = localStorage.getItem("user_" + username);
  if (kayitli && kayitli === password) { alert("Giriş başarılı! Hoşgeldin " + username); toggleGirisPanel(); }
  else alert("Hatalı kullanıcı adı veya şifre!");
}

</script>
</body>
</html>
